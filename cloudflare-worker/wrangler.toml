name = "margli-telemetry"
main = "src/worker.js"
compatibility_date = "2026-05-01"

# KV для хранения снапшотов: ключ = install_id, значение = последний JSON.
# Создать namespace перед deploy:
#   wrangler kv:namespace create TELEMETRY
# Полученный id вставить ниже.
[[kv_namespaces]]
binding = "TELEMETRY"
id = "REPLACE_WITH_KV_ID"

# Опциональный webhook на Google Sheet через Apps Script.
# Закинуть через `wrangler secret put SHEET_WEBHOOK_URL`.
# Если не задан — Worker просто пишет в KV, без зеркала в Sheet.

# Опциональный whitelist версий (regex). Например:
#   ALLOWED_VERSIONS = "^0\\.1\\.[0-9]+(-alpha\\..*)?$"
# Закинуть через `wrangler secret put ALLOWED_VERSIONS`.
